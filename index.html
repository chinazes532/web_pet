<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>НАКАЧАЙСЯ СЕЙЧАС</title>
</head>
<body>

    <div class="hero">
        <div class="hero-content">
            <h1>Ты устал тратить время в зале - и не видеть результатов?</h1>
            <p>Я помог 347 клиентам накачаться за 30-90 дней. Твой план уже готов. Осталось только начать.</p>
            <button class="hero-btn" type="button" onclick="showForm()">👉 Получить бесплатный план на 7 дней</button>
        </div>

        <div class="hero-bg">
            <img src="https://cs13.pikabu.ru/video/2023/02/11/1676136975222511465_9e793827_1920x1080.jpg" alt="Тренер в работе" loading="lazy">
        </div>
    </div>

    <div class="form-container" id="form-container">
  <form id="my-form">
    <div class="form-group">
      <label for="firstName">Имя</label>
      <input type="text" id="firstName" name="firstName" placeholder="Имя" required>
    </div>

    <div class="form-group">
      <label for="lastName">Фамилия</label>
      <input type="text" id="lastName" name="lastName" placeholder="Фамилия" required>
    </div>

    <div class="form-group">
      <label for="phone">Телефон</label>
      <input type="tel" id="phone" name="phone" placeholder="+7 (999) 000-00-00" required>
    </div>

    <div class="form-group">
      <label for="experience">Стаж занятий</label>
      <input type="text" id="experience" name="experience" placeholder="Например: 2 года" required>
    </div>

    <div class="form-group">
      <label>Пол</label>
      <div class="radio-group">
        <label for="male">
          <input type="radio" id="male" name="checkGender" value="male" required>
          Мужской
        </label>
        <label for="female">
          <input type="radio" id="female" name="checkGender" value="female" required>
          Женский
        </label>
      </div>
    </div>

    <button type="submit" class="send-btn">Отправить</button>
  </form>
</div>

 <footer class='footer'>
        <div class='footer-container'>

            <div class='footer-logo'>
                <h2>GOLUBA TEAM</h2>
                <p>Частная тренировочная школа</p>
            </div>

            <div class='footer-socials'>
                <a href='https://t.me/psych0ce00'>Telegram</a>
                <a href='https://instagram.com'>Instagram</a>
                <a href='#'>VK</a>
            </div>
        </div>

        <div class='footer-bottom'>
            <p>© 2026 GOLUBA TEAM. Все права защищены.</p>
        </div>

    </footer>
    
</body>

<script src="scripts.js"></script>
</html>
